<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurassic Tap</title>
    <link rel="icon" href="images/icones/icone X64.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    
</head> 
<body>
<!--<div class="container">
          <div class="boutons text-center">
            <button id="sauvegarde" class="btn btn-success">Export Sauvegarde</button>
            <button id="chargement" class="btn btn-primary">Chargement Sauvegarde</button>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>
    </div>-->
    <div>
<h1 class="title">Jurassic Tap</h1>
    </div>

    <div class="map">

          

   <img src="images/montagnv2.png" class="montagne">


   <div id="compteur" class="compteur-overlay">0</div>

  <!-- Protéine -->
  <img id="image2" src="images/Bouton/Proteine.png" alt="Image 2" class="item proteine">
  <!-- Glucide -->
  <img id="image1" src="images/Bouton/Glucide.png" alt="Image 1" class="item glucide">

  <!-- Lipide -->
  <img id="image3" src="images/Bouton/Lipide.png" alt="Image 3" class="item lipide">
  
  <img src="images/dino/dino1.png" class="dino">

  <!-- Zone 1 -->
  <div class="zone-lock zone1"><span class="zone-text">100pts</span></div>

  <!-- Zone 2 -->
  <div class="zone-lock zone2"><span class="zone-text">1000pts</span></div>
  <!-- Zone 3 
  <div class="zone zone3"></div>-->
  <!-- Zone 4 -->
  <div class="zone-lock zone4"><span class="zone-text">10000pts</span></div>
  <!-- Zone 5 -->
  <div class="zone-lock zone5"><span class="zone-text">100000pts</span></div>
  <!-- Zone 6 -->
   <div id="ZoneTraining" class="zone-lock zone6" onclick="handleZone6Click()"><span class="zone-text">10pts</span></div>
  <!-- Zone 7 -->
  <div class="zone-lock zone7"><span class="zone-text">1000000pts</span></div>

</div>


    <footer class="footer">
        <div class="footer-content">
            <p id="version">V.0.0.0</p>
        </div>
    </footer>
    <div class="easter-egg-overlay" id="easterEggOverlay">
        <img src="images/easter_egg/easter egg.png" alt="Easter Egg" class="easter-egg-image">
    </div>

    <!-- Modal Zone 6 -->
    <div class="modal fade" id="zone6Modal" tabindex="-1" aria-labelledby="zone6ModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content zone6-modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="zone6ModalLabel">Zone 6</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body zone6-modal-body">
                    <p>Zone 6 déverrouillée !</p>
                    <div class="mt-4">
                        <h6>Améliorations</h6>
                        <button id="autoIncrementBtn" class="btn btn-primary" onclick="buyAutoIncrement()">
                            Amélioration Auto-Increment - Coût: 150 clics
                        </button>
                        <p id="autoIncrementStatus" class="mt-2" style="display: none; color: rgb(255, 230, 0);">✓ Amélioration achetée - +1 clic par seconde</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
