<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurassic Tap</title>
    <link rel="icon" href="images/icones/icone X64.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    
</head> 
<body>
    <div class="container">
        <h1 class="text-center">Jurassic Tap</h1>
        <p class="text-center">Page de debut du Jeu</p>
        <div id="compteur" class="text-center">0</div>
        <div class="boutons text-center">
            <button id="sauvegarde" class="btn btn-success">Export Sauvegarde</button>
            <button id="chargement" class="btn btn-primary">Chargement Sauvegarde</button>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>
        <div class="images row">
            <div class="col-md-4 text-center">
                <figure>
                    <img id="image1" src="images/Bouton/Glucide.png" alt="Image 1" class="img-fluid">
                    <figcaption>Glucide</figcaption>
                </figure>
            </div>
            <div class="col-md-4 text-center">
                <figure>
                    <img id="image2" src="images/Bouton/Proteine.png" alt="Image 2" class="img-fluid">
                    <figcaption>Protéine</figcaption>
                </figure>
            </div>
            <div class="col-md-4 text-center">
                <figure>
                    <img id="image3" src="images/Bouton/Lipide.png" alt="Image 3" class="img-fluid">
                    <figcaption>Lipide</figcaption>
                </figure>
            </div>
        </div>
    </div>
    </div>
    <footer class="footer">
        <div class="footer-content">
            <p id="version">V.0.0.0</p>
        </div>
    </footer>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
